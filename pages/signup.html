<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Enrollment | BrightSteps Kids Activity Center</title>

    <meta name="description" content="Create your BrightSteps family account and start your child's journey in music, art, and sports.">

    <!-- Required Icons -->
    <link rel="icon" type="image/svg+xml" href="../assets/images/ui/favicon.svg">

    <!-- Local Design System CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
    
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../tailwind.config.js"></script>

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        .reveal-up { opacity: 0; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-card {
            background: rgba(38, 38, 38, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-800 antialiased font-sans dark:bg-neutral-900 dark:text-neutral-50 min-h-screen">

    <div class="min-h-screen flex flex-col lg:flex-row">
        <!-- LEFT: VISUAL -->
        <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-primary">
            <img src="../assets/images/content/hero-creative.webp" alt="Kids learning" class="absolute inset-0 w-full h-full object-cover mix-blend-overlay opacity-50 grayscale hover:grayscale-0 transition-all duration-1000 scale-110">
            <div class="relative z-10 w-full flex flex-col justify-between p-20 text-white">
                <a href="../index.html">
                    <img src="../assets/images/ui/logo-white.svg" alt="BrightSteps" class="h-10">
                </a>
                
                <div class="space-y-8 reveal-up">
                    <h2 class="text-6xl font-black leading-tight tracking-tighter">Every Step <br>is a Discovery.</h2>
                    <p class="text-xl font-medium opacity-80 max-w-md italic">"Join our community of Austin families focused on holistic growth and creative confidence."</p>
                    <div class="flex items-center space-x-4">
                        <div class="flex -space-x-3">
                            <div class="w-10 h-10 rounded-full border-2 border-white bg-primary"></div>
                            <div class="w-10 h-10 rounded-full border-2 border-white bg-secondary"></div>
                            <div class="w-10 h-10 rounded-full border-2 border-white bg-accent"></div>
                        </div>
                        <span class="text-sm font-bold uppercase tracking-widest text-left">4.9/5 Rating from Parents</span>
                    </div>
                </div>

                <p class="text-[10px] font-bold uppercase tracking-[0.3em] opacity-40">&copy; 2024 BrightSteps Ecosystem</p>
            </div>
            
            <!-- Abstract shapes -->
            <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-accent rounded-full blur-[100px] opacity-20"></div>
            <div class="absolute -top-20 -left-20 w-80 h-80 bg-secondary rounded-full blur-[100px] opacity-20"></div>
        </div>

        <!-- RIGHT: FORM (Scrollable) -->
        <div class="w-full lg:w-1/2 flex flex-col justify-center items-center p-8 lg:p-20 relative bg-neutral-50 dark:bg-neutral-900 transition-colors duration-500 min-h-screen overflow-y-auto">
            <!-- Mobile Logo -->
            <a href="../index.html" class="lg:hidden absolute top-12 left-8">
                <img src="../assets/images/ui/logo.svg" alt="BrightSteps" class="h-8 dark:invert">
            </a>

            <div class="w-full max-w-sm space-y-12 reveal-up">
                <div class="space-y-3">
                    <h1 class="text-4xl font-black tracking-tighter dark:text-neutral-50">Create Account.</h1>
                    <p class="text-neutral-500 dark:text-neutral-400 font-medium">Start your family's journey today.</p>
                </div>

                <form action="dashboard-user.html" class="space-y-8">
                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-neutral-400 dark:text-neutral-500 ml-1">First Name</label>
                                <input type="text" placeholder="Sarah" class="w-full px-6 py-5 bg-white dark:bg-neutral-800 border-b-2 border-neutral-100 dark:border-neutral-700 focus:border-primary transition-all outline-none text-sm font-medium dark:text-neutral-100 shadow-sm rounded-2xl" required>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-neutral-400 dark:text-neutral-500 ml-1">Last Name</label>
                                <input type="text" placeholder="Jenkins" class="w-full px-6 py-5 bg-white dark:bg-neutral-800 border-b-2 border-neutral-100 dark:border-neutral-700 focus:border-primary transition-all outline-none text-sm font-medium dark:text-neutral-100 shadow-sm rounded-2xl" required>
                            </div>
                        </div>
                        
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-neutral-400 dark:text-neutral-500 ml-1">Email Address</label>
                            <input type="email" placeholder="sarah@example.com" class="w-full px-6 py-5 bg-white dark:bg-neutral-800 border-b-2 border-neutral-100 dark:border-neutral-700 focus:border-primary transition-all outline-none text-sm font-medium dark:text-neutral-100 shadow-sm rounded-2xl" required>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-neutral-400 dark:text-neutral-500 ml-1">Secure Password</label>
                            <input type="password" placeholder="••••••••" class="w-full px-6 py-5 bg-white dark:bg-neutral-800 border-b-2 border-neutral-100 dark:border-neutral-700 focus:border-primary transition-all outline-none text-sm font-medium dark:text-neutral-100 shadow-sm rounded-2xl" required>
                        </div>
                    </div>

                    <div class="flex items-start space-x-3 text-[10px] text-neutral-400 bg-neutral-100 dark:bg-neutral-800/50 p-4 rounded-xl border border-neutral-200 dark:border-neutral-700">
                        <input type="checkbox" id="terms" class="mt-1 w-4 h-4 accent-primary rounded-custom border-neutral-300 shrink-0" required>
                        <label for="terms" class="cursor-pointer leading-relaxed">I agree to the terms of enrollment and data privacy policy for BrightSteps Texas Campus.</label>
                    </div>

                    <button type="submit" class="w-full bg-primary text-white font-black py-5 rounded-[1.25rem] shadow-2xl shadow-primary/30 hover:shadow-primary/50 hover:-translate-y-1 transition-all text-xs uppercase tracking-[0.2em]">
                        Join the Community
                    </button>
                </form>

                <div class="pt-8 border-t border-neutral-100 dark:border-neutral-800 flex flex-col items-center space-y-6">
                    <p class="text-xs font-bold text-neutral-400">Already a member? <a href="login.html" class="text-primary hover:underline font-black">Sign in instead</a></p>
                    
                    <!-- Social Login Options -->
                    <div class="flex space-x-4">
                        <button class="p-4 bg-white dark:bg-neutral-800 border border-neutral-100 dark:border-neutral-700 rounded-2xl hover:shadow-lg transition-all dark:text-neutral-400 group">
                            <svg class="h-5 w-5 group-hover:text-primary transition-colors" fill="currentColor" viewBox="0 0 24 24"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.908 3.152-1.928 4.172-1.272 1.272-3.264 2.488-6.192 2.488-4.848 0-8.592-3.92-8.592-8.768S7.344 3.064 12.192 3.064c2.56 0 4.608.832 6.016 2.128l2.36-2.36C18.6 1.04 15.68 0 12.192 0 5.488 0 0 5.488 0 12.192S5.488 24.384 12.192 24.384c3.488 0 6.136-1.152 8.136-3.248 2.128-2.128 2.8-5.152 2.8-7.552 0-.72-.056-1.4-.16-2.08h-10.48z"/></svg>
                        </button>
                        <button class="p-4 bg-white dark:bg-neutral-800 border border-neutral-100 dark:border-neutral-700 rounded-2xl hover:shadow-lg transition-all dark:text-neutral-400 group">
                             <svg class="h-5 w-5 group-hover:text-primary transition-colors" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN JS -->
    <script type="module" src="../assets/js/main.js"></script>
    
    <!-- GSAP Initialization -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.to('.reveal-up', {
                opacity: 1,
                y: 0,
                duration: 1.2,
                stagger: 0.1,
                ease: 'power4.out',
                startAt: { y: 40 }
            });
            
            gsap.from('img[alt="Kids learning"]', {
                scale: 1.3,
                duration: 2.5,
                ease: 'power2.out'
            });
        });
    </script>
</body>
</html>
